<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hermes</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            background: #f9f9f9;
            color: #1a1a1a;
            font-size: 14px;
        }

        header {
            background: #222;
            color: #fff;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 1.1rem;
            letter-spacing: 0.03em;
            white-space: nowrap;
            color: #fff;
        }

        .search-wrap {
            flex: 1;
            max-width: 480px;
            position: relative;
        }

        .search-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
            font-size: 0.88rem;
            padding: 0.35rem 2rem 0.35rem 2.1rem;
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }

        .search-wrap input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.12);
        }

        .search-wrap input::placeholder {
            color: #888;
        }

        .search-icon {
            position: absolute;
            left: 0.6rem;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            padding: 2px 4px;
            display: none;
            font-family: inherit;
        }

        .search-clear:hover {
            color: #ccc;
        }

        .header-count {
            color: #888;
            font-size: 0.82rem;
            white-space: nowrap;
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1000px;
            width: 100%;
            box-sizing: border-box;
            margin: 0 auto;
        }

        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .video-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.65rem 0.75rem;
            border-bottom: 1px solid #e8e8e8;
            border-radius: 4px;
            transition: background 0.12s;
            animation: fadeSlide 0.18s ease both;
        }

        .video-row:hover {
            background: #f0f0f0;
        }

        .video-row .title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.88rem;
        }

        .video-row .meta {
            color: #888;
            font-size: 0.78rem;
            flex-shrink: 0;
        }

        #search-results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .result-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeSlide 0.18s ease both;
            transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
        }

        .result-card:hover {
            border-color: #bbb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transform: translateY(-1px);
        }

        .thumb-wrap {
            position: relative;
            aspect-ratio: 16/9;
            background: #eee;
            overflow: hidden;
        }

        .thumb-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .thumb-wrap img.loaded {
            opacity: 1;
        }

        .duration-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.72);
            color: #fff;
            font-size: 0.7rem;
            padding: 2px 5px;
            border-radius: 3px;
        }

        .card-body {
            padding: 0.65rem 0.75rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
        }

        .card-title {
            font-size: 0.82rem;
            font-weight: 500;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            color: #888;
            font-size: 0.75rem;
            margin-top: auto;
        }

        .card-footer {
            padding: 0 0.75rem 0.75rem;
        }

        .btn {
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 4px;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 0.35rem 0.85rem;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
            width: 100%;
            text-align: center;
        }

        .btn-download {
            background: #222;
            color: #fff;
            border-color: #222;
        }

        .btn-download:hover {
            background: #3a3a3a;
            border-color: #3a3a3a;
        }

        .btn-downloading {
            background: transparent;
            color: #555;
            border-color: #ccc;
            cursor: default;
        }

        .btn-downloading::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            border: 1.5px solid #888;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        .btn-done {
            background: transparent;
            color: #aaa;
            border-color: #e0e0e0;
            cursor: default;
        }

        .btn-done::before {
            content: '✓  ';
        }

        .btn-error {
            background: transparent;
            color: #c0392b;
            border-color: #e0b0b0;
            cursor: pointer;
        }

        .btn-error:hover {
            background: #fdf0ef;
        }

        .empty-state {
            color: #aaa;
            padding: 3rem 0;
            text-align: center;
            font-size: 0.88rem;
            font-style: italic;
        }

        .spinner-global {
            display: flex;
            justify-content: center;
            padding: 3rem;
        }

        .spinner-global::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-top-color: #555;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        footer {
            text-align: center;
            padding: 1rem;
            background: #222;
            color: #888;
            font-size: 0.82rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Hermes</h1>
        <div class="search-wrap">
            <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="search-input" placeholder="search youtube..." autocomplete="off"
                spellcheck="false" />
            <button class="search-clear" id="search-clear" title="clear">✕</button>
        </div>
        <span class="header-count" id="header-count"></span>
    </header>

    <main>
        <div id="view-library">
            <div class="section-label">Library</div>
            <div id="library">
                <div class="spinner-global"></div>
            </div>
        </div>
        <div id="view-search" style="display:none">
            <div class="section-label" id="search-label">Results</div>
            <div id="search-results"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 Hermes</p>
    </footer>

    <script>
        const API = '';

        function fmt(seconds) {
            if (!seconds) return '';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if (h) return `${h}h ${m}m`;
            return `${m}m ${String(s).padStart(2, '0')}s`;
        }

        function fmtViews(n) {
            if (!n) return '';
            if (n >= 1e6) return `${(n / 1e6).toFixed(1)}M views`;
            if (n >= 1e3) return `${(n / 1e3).toFixed(0)}K views`;
            return `${n} views`;
        }

        function lazyImg(img) {
            img.onload = () => img.classList.add('loaded');
            img.onerror = () => img.style.display = 'none';
        }

        async function loadLibrary() {
            const el = document.getElementById('library');
            try {
                const res = await fetch(`${API}/api/videos`);
                const videos = await res.json();
                document.getElementById('header-count').textContent =
                    `${videos.length} video${videos.length !== 1 ? 's' : ''}`;
                if (!videos.length) {
                    el.innerHTML = `<div class="empty-state">Nothing downloaded yet.</div>`;
                    return;
                }
                el.innerHTML = videos.map((v, i) => `
                    <div class="video-row" style="animation-delay:${i * 16}ms">
                        <span class="title" title="${esc(v.title)}">${esc(v.title)}</span>
                        <span class="meta">${v.size_mb} MB</span>
                    </div>
                `).join('');
            } catch (e) {
                el.innerHTML = `<div class="empty-state">Could not reach server.</div>`;
            }
        }

        let searchTimeout;
        let currentStatuses = {};

        async function doSearch(q) {
            if (!q.trim()) { showLibrary(); return; }
            showSearchView();
            const label = document.getElementById('search-label');
            const resultsEl = document.getElementById('search-results');
            label.textContent = `Results for "${q}"`;
            resultsEl.innerHTML = `<div class="spinner-global" style="grid-column:1/-1"></div>`;
            try {
                const [searchRes, statusRes] = await Promise.all([
                    fetch(`${API}/api/search?q=${encodeURIComponent(q)}&limit=30`),
                    fetch(`${API}/api/status`),
                ]);
                const results = await searchRes.json();
                currentStatuses = await statusRes.json();
                label.textContent = `Results for "${q}" — ${results.length}`;
                document.getElementById('header-count').textContent =
                    `${results.length} result${results.length !== 1 ? 's' : ''}`;
                if (!results.length) {
                    resultsEl.innerHTML = `<div class="empty-state" style="grid-column:1/-1">No results found.</div>`;
                    return;
                }
                resultsEl.innerHTML = results.map((v, i) => {
                    const status = currentStatuses[v.url] || (v.downloaded ? 'downloaded' : 'none');
                    return renderCard(v, status, i);
                }).join('');
                resultsEl.querySelectorAll('img[data-src]').forEach(img => {
                    img.src = img.dataset.src;
                    lazyImg(img);
                });
            } catch (e) {
                resultsEl.innerHTML = `<div class="empty-state" style="grid-column:1/-1">Search failed — is the server running?</div>`;
            }
        }

        function renderCard(v, status, i) {
            const thumb = v.thumbnail
                ? `<img data-src="${esc(v.thumbnail)}" alt="" />`
                : '';
            const dur = v.duration ? `<span class="duration-badge">${fmt(v.duration)}</span>` : '';
            let btn = '';
            if (status === 'downloading') {
                btn = `<button class="btn btn-downloading" disabled>Downloading</button>`;
            } else if (status === 'done' || status === 'downloaded') {
                btn = `<button class="btn btn-done" disabled>Downloaded</button>`;
            } else if (status === 'error') {
                btn = `<button class="btn btn-error" onclick="startDownload('${esc(v.url)}', this)">Retry</button>`;
            } else {
                btn = `<button class="btn btn-download" onclick="startDownload('${esc(v.url)}', this)">Download</button>`;
            }
            return `
                <div class="result-card" style="animation-delay:${i * 20}ms">
                    <div class="thumb-wrap">${thumb}${dur}</div>
                    <div class="card-body">
                        <div class="card-title">${esc(v.title)}</div>
                        <div class="card-meta">${esc(v.uploader)}${v.view_count ? ' ~ ' + fmtViews(v.view_count) : ''}</div>
                    </div>
                    <div class="card-footer">${btn}</div>
                </div>
            `;
        }

        async function startDownload(url, btn) {
            btn.className = 'btn btn-downloading';
            btn.disabled = true;
            btn.textContent = 'Downloading';
            try {
                const res = await fetch(`${API}/api/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url }),
                });
                const data = await res.json();
                if (data.status === 'started' || data.status === 'already_downloading') {
                    pollDownload(url, btn);
                } else {
                    btn.className = 'btn btn-error';
                    btn.disabled = false;
                    btn.textContent = 'Retry';
                }
            } catch {
                btn.className = 'btn btn-error';
                btn.disabled = false;
                btn.textContent = 'Retry';
            }
        }

        function pollDownload(url, btn) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${API}/api/status`);
                    const statuses = await res.json();
                    const status = statuses[url];
                    if (status === 'done') {
                        clearInterval(interval);
                        btn.className = 'btn btn-done';
                        btn.disabled = true;
                        btn.textContent = 'Downloaded';
                        loadLibrary();
                    } else if (status === 'error') {
                        clearInterval(interval);
                        btn.className = 'btn btn-error';
                        btn.disabled = false;
                        btn.textContent = 'Retry';
                        btn.onclick = () => startDownload(url, btn);
                    }
                } catch { }
            }, 2000);
        }

        function showLibrary() {
            document.getElementById('view-library').style.display = '';
            document.getElementById('view-search').style.display = 'none';
            document.getElementById('header-count').textContent = '';
            loadLibrary();
        }

        function showSearchView() {
            document.getElementById('view-library').style.display = 'none';
            document.getElementById('view-search').style.display = '';
        }

        function esc(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        const input = document.getElementById('search-input');
        const clearBtn = document.getElementById('search-clear');

        input.addEventListener('input', () => {
            clearBtn.style.display = input.value ? 'block' : 'none';
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => doSearch(input.value), 500);
        });

        input.addEventListener('keydown', e => {
            if (e.key === 'Escape') clearBtn.click();
        });

        clearBtn.addEventListener('click', () => {
            input.value = '';
            clearBtn.style.display = 'none';
            showLibrary();
            input.focus();
        });

        loadLibrary();
    </script>
</body>

</html>
